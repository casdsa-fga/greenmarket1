<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бонусная программа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
        }
        body {
            background: #0a0f0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .app {
            max-width: 420px;
            width: 100%;
            background: linear-gradient(160deg, #0d1a0d, #0a120a);
            border-radius: 32px;
            padding: 20px 16px 30px;
            border: 1px solid #1a4a1a;
            box-shadow: 0 0 60px rgba(0, 255, 100, 0.08);
            color: #b0d0b0;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .promo-badge {
            background: #00c853;
            color: #000;
            padding: 4px 14px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 12px;
            letter-spacing: 0.3px;
            box-shadow: 0 0 24px #00c85380;
        }
        .timer-block {
            background: #0f1a0f;
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid #1f4a1f;
            font-size: 14px;
            font-weight: 700;
            color: #8bc34a;
        }

        /* Баланс */
        .balance-block {
            text-align: center;
            padding: 14px 0 10px;
            background: rgba(0, 30, 0, 0.4);
            border-radius: 24px;
            border: 1px solid #1a3a1a;
            margin-bottom: 18px;
        }
        .balance-number {
            font-size: 52px;
            font-weight: 900;
            color: #69f0ae;
            text-shadow: 0 0 40px #00e67660;
            letter-spacing: 2px;
        }
        .balance-label {
            color: #6a8a6a;
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* Кнопка вывода */
        .withdraw-btn {
            width: 100%;
            padding: 16px;
            margin: 12px 0 6px;
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            border: 1px solid #4caf50;
            border-radius: 60px;
            font-weight: 800;
            font-size: 18px;
            color: #e0f0e0;
            box-shadow: 0 4px 24px #00c85340;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .withdraw-btn:active {
            transform: scale(0.96);
        }
        .withdraw-btn.disabled {
            opacity: 0.3;
            filter: grayscale(0.8);
            pointer-events: none;
        }
        .withdraw-hint {
            color: #a5d6a7;
            font-size: 13px;
            text-align: center;
            margin-bottom: 8px;
        }

        /* Лента фейковых выводов */
        .feed-title {
            color: #4caf50;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 18px 0 10px;
            border-bottom: 1px solid #1a3a1a;
            padding-bottom: 6px;
            text-transform: uppercase;
        }
        .feed-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 260px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .feed-list::-webkit-scrollbar {
            width: 3px;
        }
        .feed-list::-webkit-scrollbar-thumb {
            background: #2e7d32;
            border-radius: 10px;
        }
        .feed-item {
            background: rgba(0, 30, 0, 0.3);
            border-left: 3px solid #388e3c;
            padding: 10px 14px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.6s ease;
            font-size: 14px;
        }
        .feed-user {
            font-weight: 700;
            color: #a5d6a7;
        }
        .feed-user span {
            color: #6a9a6a;
            font-weight: 400;
        }
        .feed-amount {
            font-weight: 800;
            color: #69f0ae;
            font-size: 16px;
        }
        .feed-amount small {
            font-weight: 400;
            color: #4caf50;
            font-size: 12px;
        }
        .feed-time {
            color: #4a7a4a;
            font-size: 12px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Реклама */
        .ad-block {
            margin-top: 18px;
            background: #0a180a;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            font-size: 13px;
            color: #3a6a3a;
            border: 1px dashed #1a4a1a;
        }

        /* Модалка вывода */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #0d1a0d;
            padding: 28px 20px;
            border-radius: 32px;
            max-width: 360px;
            width: 100%;
            border: 1px solid #2e7d32;
            box-shadow: 0 0 60px #00c85330;
        }
        .modal h3 {
            color: #69f0ae;
            margin-bottom: 16px;
            text-align: center;
        }
        .modal label {
            display: block;
            font-size: 12px;
            color: #6a8a6a;
            margin: 12px 0 4px;
            letter-spacing: 0.5px;
        }
        .modal input, .modal select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid #1a3a1a;
            background: #061206;
            color: #c0e0c0;
            font-size: 15px;
            outline: none;
        }
        .modal input:focus, .modal select:focus {
            border-color: #4caf50;
        }
        .modal .row-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal .btn-submit {
            flex: 1;
            padding: 14px;
            background: #2e7d32;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            color: #e0f0e0;
            border: 1px solid #4caf50;
        }
        .modal .btn-cancel {
            flex: 1;
            padding: 14px;
            background: #1a2a1a;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            color: #6a8a6a;
            border: 1px solid #2a4a2a;
        }
        .info-note {
            font-size: 11px;
            color: #4a6a4a;
            text-align: center;
            margin-top: 14px;
            border-top: 1px solid #1a2a1a;
            padding-top: 12px;
        }
    </style>
</head>
<body>

<div class="app" id="app">
    <!-- Шапка -->
    <div class="header">
        <div class="promo-badge">⚡ АКЦИЯ</div>
        <div class="timer-block" id="promoTimer">--:--:--</div>
    </div>

    <!-- Баланс -->
    <div class="balance-block">
        <div class="balance-number" id="balanceDisplay">0</div>
        <div class="balance-label">Бонусные рубли</div>
    </div>

    <!-- Кнопка вывода -->
    <button class="withdraw-btn disabled" id="withdrawBtn">Вывести 3000 ₽</button>
    <div class="withdraw-hint" id="withdrawHint">Для вывода накопите 3000 бонусов</div>

    <!-- Лента фейковых выводов -->
    <div class="feed-title">📊 Последние выплаты</div>
    <div class="feed-list" id="feedList">
        <!-- сюда динамически добавляются элементы -->
    </div>

    <!-- Рекламный блок -->
    <div class="ad-block">
        📢 Рекламная интеграция (ваш код)
    </div>

    <div class="info-note">
        ⏳ Выплаты в течение 30 часов после заявки
    </div>
</div>

<!-- Модалка вывода -->
<div class="modal-overlay" id="withdrawModal">
    <div class="modal">
        <h3>💸 Оформление вывода</h3>
        <label>Сумма (от 3000)</label>
        <input type="number" id="withdrawAmount" value="3000" min="3000" step="100">

        <label>Способ получения</label>
        <select id="withdrawMethod">
            <option value="sbp">СБП (по номеру телефона)</option>
            <option value="card">Прямо на карту</option>
        </select>

        <div id="methodField">
            <label id="methodLabel">Номер телефона (СБП)</label>
            <input type="text" id="methodValue" placeholder="+7 900 123 45 67">
        </div>

        <div class="row-buttons">
            <button class="btn-cancel" id="modalCancel">Отмена</button>
            <button class="btn-submit" id="modalSubmit">Запросить</button>
        </div>
        <div style="font-size:11px; color:#4a6a4a; text-align:center; margin-top:10px;">
            Деньги поступят в течение 30 часов
        </div>
    </div>
</div>

<script>
    // ============================================
    // 1. БАЛАНС И ПОРОГ
    // ============================================
    let userBalance = parseInt(sessionStorage.getItem('swill_balance')) || 420;
    const WITHDRAW_THRESHOLD = 3000;

    const balanceEl = document.getElementById('balanceDisplay');
    const withdrawBtn = document.getElementById('withdrawBtn');
    const hintEl = document.getElementById('withdrawHint');
    const modal = document.getElementById('withdrawModal');

    function updateBalanceUI() {
        balanceEl.textContent = userBalance;
        if (userBalance >= WITHDRAW_THRESHOLD) {
            withdrawBtn.classList.remove('disabled');
            hintEl.textContent = '✅ Вы можете вывести средства';
        } else {
            withdrawBtn.classList.add('disabled');
            hintEl.textContent = `❌ Нужно ещё ${WITHDRAW_THRESHOLD - userBalance} бонусов`;
        }
        sessionStorage.setItem('swill_balance', userBalance);
    }
    updateBalanceUI();

    // Имитация начисления (каждые 12 сек +70)
    setInterval(() => {
        userBalance += 70;
        updateBalanceUI();
    }, 12000);

    // ============================================
    // 2. ТАЙМЕР АКЦИИ (до 12:00)
    // ============================================
    function updatePromoTimer() {
        const now = new Date();
        let target = new Date(now);
        target.setHours(12, 0, 0, 0);
        if (now > target) target.setDate(target.getDate() + 1);
        const diff = Math.max(0, target - now);
        const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
        const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
        const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
        document.getElementById('promoTimer').textContent = `${h}:${m}:${s}`;
    }
    updatePromoTimer();
    setInterval(updatePromoTimer, 1000);

    // ============================================
    // 3. ФЕЙКОВАЯ ЛЕНТА ВЫВОДОВ
    // ============================================
    const names = [
        'Алексей', 'Максим', 'Дмитрий', 'Анна', 'Екатерина', 'Сергей', 
        'Ольга', 'Иван', 'Мария', 'Андрей', 'Татьяна', 'Николай',
        'Елена', 'Павел', 'Наталья', 'Артём', 'Ирина', 'Денис',
        'Кристина', 'Владимир', 'Юлия', 'Григорий', 'Виктория', 'Роман',
        'Анастасия', 'Константин', 'Светлана', 'Даниил', 'Евгения', 'Вадим'
    ];

    const amounts = [3200, 4500, 5100, 6800, 7300, 8200, 9400, 10100, 12500, 13800, 15200, 16700, 18400, 20300, 22600];

    function randomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function randomTime() {
        const mins = Math.floor(Math.random() * 60);
        const secs = Math.floor(Math.random() * 60);
        return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function randomDate() {
        const d = new Date();
        d.setMinutes(d.getMinutes() - Math.floor(Math.random() * 120));
        return d;
    }

    function formatTimeAgo(date) {
        const diff = Math.floor((Date.now() - date.getTime()) / 60000);
        if (diff < 1) return 'только что';
        if (diff < 60) return `${diff} мин назад`;
        const hours = Math.floor(diff / 60);
        if (hours < 24) return `${hours} ч назад`;
        return `${Math.floor(hours / 24)} д назад`;
    }

    function generateFeedItem() {
        const name = randomItem(names);
        const amount = randomItem(amounts);
        const date = randomDate();
        const timeAgo = formatTimeAgo(date);
        return { name, amount, timeAgo };
    }

    const feedList = document.getElementById('feedList');

    // Генерируем начальные 12 записей
    let feedItems = [];
    for (let i = 0; i < 12; i++) {
        feedItems.push(generateFeedItem());
    }
    // Сортируем по времени (самые новые — первые)
    feedItems.sort((a, b) => a.timeAgo.localeCompare(b.timeAgo));

    function renderFeed() {
        feedList.innerHTML = '';
        feedItems.forEach(item => {
            const div = document.createElement('div');
            div.className = 'feed-item';
            div.innerHTML = `
                <div class="feed-user">${item.name} <span>вывел(а)</span></div>
                <div class="feed-amount">${item.amount.toLocaleString()} <small>₽</small></div>
                <div class="feed-time">${item.timeAgo}</div>
            `;
            feedList.appendChild(div);
        });
    }
    renderFeed();

    // Каждые 8-15 секунд добавляем новый фейковый вывод (в начало списка)
    function addNewFakeWithdraw() {
        const newItem = generateFeedItem();
        feedItems.unshift(newItem);
        if (feedItems.length > 25) feedItems.pop(); // ограничиваем ленту
        renderFeed();
    }

    setInterval(addNewFakeWithdraw, Math.random() * 7000 + 8000);

    // Иногда чередуем с большими суммами
    setInterval(() => {
        const bigAmounts = [28000, 32100, 40500, 53000, 67200, 81000];
        const item = {
            name: randomItem(names),
            amount: randomItem(bigAmounts),
            timeAgo: 'только что'
        };
        feedItems.unshift(item);
        if (feedItems.length > 25) feedItems.pop();
        renderFeed();
    }, 45000);

    // ============================================
    // 4. МОДАЛКА ВЫВОДА
    // ============================================
    withdrawBtn.addEventListener('click', () => {
        if (userBalance < WITHDRAW_THRESHOLD) return;
        modal.classList.add('active');
    });

    document.getElementById('withdrawMethod').addEventListener('change', function() {
        const label = document.getElementById('methodLabel');
        const input = document.getElementById('methodValue');
        if (this.value === 'sbp') {
            label.textContent = 'Номер телефона (СБП)';
            input.placeholder = '+7 900 123 45 67';
        } else {
            label.textContent = 'Номер карты';
            input.placeholder = '1234 5678 9012 3456';
        }
    });

    document.getElementById('modalCancel').addEventListener('click', () => {
        modal.classList.remove('active');
    });

    document.getElementById('modalSubmit').addEventListener('click', () => {
        const amount = parseInt(document.getElementById('withdrawAmount').value);
        const method = document.getElementById('withdrawMethod').value;
        const value = document.getElementById('methodValue').value.trim();

        if (amount < 3000 || isNaN(amount)) {
            alert('Минимум 3000 ₽');
            return;
        }
        if (!value) {
            alert('Заполните реквизиты');
            return;
        }

        alert(`✅ Заявка на ${amount} ₽ принята!\nСпособ: ${method === 'sbp' ? 'СБП' : 'Карта'}\nРеквизиты: ${value}\n⏳ Ожидайте 30 часов.`);

        userBalance -= amount;
        updateBalanceUI();
        modal.classList.remove('active');
    });

    modal.addEventListener('click', (e) => {
        if (e.target === modal) modal.classList.remove('active');
    });

    // ============================================
    // 5. ДОП. ИЛЛЮЗИЯ: ПЕРИОДИЧЕСКИ ОБНОВЛЯЕМ "СРОК АКЦИИ" (уже в таймере)
    // ============================================
    console.log('🔥 SWILL ACTIVE: фейковые выводы генерируются автоматически.');
</script>
</body>
</html>
